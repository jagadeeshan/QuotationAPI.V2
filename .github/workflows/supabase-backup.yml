name: Supabase Daily Backup with Restore Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"  # Daily at 2:30 AM UTC

# Prevent concurrent backup jobs
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  # Repo where backups are committed. Override with vars.BACKUP_REPO if needed.
  BACKUP_REPO: ${{ vars.BACKUP_REPO || 'jagadeeshan/quotation-db-backups' }}
  # How many daily backups to keep in the repo (older ones are pruned automatically)
  KEEP_DAYS: "30"

jobs:
  backup:
    name: Dump Supabase Database
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      backup-name: ${{ steps.ts.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Supabase CLI
        run: |
          curl -L "https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz" -o supabase.tar.gz
          tar -xzf supabase.tar.gz
          mv supabase /usr/local/bin/supabase
          rm supabase.tar.gz
          supabase --version

      - name: Verify Docker
        run: docker info

      - name: Create backup timestamp
        id: ts
        run: echo "value=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "SUPABASE_DB_URL secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.BACKUP_REPO_TOKEN }}" ]; then
            echo "BACKUP_REPO_TOKEN secret is missing."
            exit 1
          fi

      - name: Dump roles, schema, and data
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backups/supabase/${{ steps.ts.outputs.value }}
          cd backups/supabase/${{ steps.ts.outputs.value }}

          supabase db dump --db-url "$SUPABASE_DB_URL" -f roles.sql --role-only
          supabase db dump --db-url "$SUPABASE_DB_URL" -f schema.sql
          supabase db dump --db-url "$SUPABASE_DB_URL" -f data.sql --use-copy --data-only -x "storage.buckets_vectors" -x "storage.vector_indexes"

          cat > backup-meta.json <<EOF
          {
            "createdAtUtc": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "backupType": "supabase-cli-db-dump",
            "source": "Supabase PostgreSQL",
            "files": ["roles.sql", "schema.sql", "data.sql"]
          }
          EOF

      - name: Generate checksum
        run: |
          cd backups/supabase/${{ steps.ts.outputs.value }}
          sha256sum *.sql > backup.sha256

      - name: Create archive
        run: |
          cd backups/supabase
          tar -czf supabase-backup-${{ steps.ts.outputs.value }}.tar.gz ${{ steps.ts.outputs.value }}

      # ── Commit backup directly to the backup repository ────────────────────
      - name: Checkout backup repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKUP_REPO }}
          path: backup-repo
          token: ${{ secrets.BACKUP_REPO_TOKEN }}

      - name: Install Git LFS
        run: sudo apt-get install -y git-lfs

      - name: Configure Git LFS and copy backup
        run: |
          cd backup-repo
          git lfs install
          git lfs track "*.tar.gz"
          git lfs track "*.sha256"
          git add .gitattributes 2>/dev/null || true

          # Organize by year-month
          YEAR_MONTH=$(date -u +'%Y-%m')
          mkdir -p "backups/${YEAR_MONTH}"

          ARCHIVE="supabase-backup-${{ steps.ts.outputs.value }}.tar.gz"
          cp "../backups/supabase/${ARCHIVE}" "backups/${YEAR_MONTH}/${ARCHIVE}"
          sha256sum "backups/${YEAR_MONTH}/${ARCHIVE}" > "backups/${YEAR_MONTH}/${ARCHIVE}.sha256"

      - name: Prune backups older than ${{ env.KEEP_DAYS }} days
        run: |
          cd backup-repo
          CUTOFF=$(date -u -d "${{ env.KEEP_DAYS }} days ago" +'%Y%m%d')
          PRUNED=0

          # Find .tar.gz files and remove those whose timestamp is older than cutoff
          find backups -name "supabase-backup-*.tar.gz" | while read -r f; do
            TS=$(basename "$f" | grep -oP '(?<=supabase-backup-)\d{8}')
            if [ -n "$TS" ] && [ "$TS" -lt "$CUTOFF" ]; then
              echo "Pruning old backup: $f"
              rm -f "$f" "${f}.sha256"
              PRUNED=$((PRUNED + 1))
            fi
          done

          # Remove empty year-month directories
          find backups -type d -empty -delete 2>/dev/null || true

          echo "Pruned $PRUNED backup(s) older than ${{ env.KEEP_DAYS }} days"

      - name: Commit and push backup to repository
        run: |
          cd backup-repo
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: daily backup $(date -u +'%Y-%m-%d') [${{ steps.ts.outputs.value }}]"
            git push origin main
            echo "✓ Backup committed to ${{ env.BACKUP_REPO }}"
          fi

      # Keep artifact as a secondary short-lived copy (7 days)
      - name: Upload backup artifact (short-term copy)
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.ts.outputs.value }}
          path: |
            backups/supabase/supabase-backup-${{ steps.ts.outputs.value }}.tar.gz
          retention-days: 7

  restore-validate:
    name: Validate Backup Restore
    needs: backup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: supabase-backup-${{ needs.backup.outputs.backup-name }}
          path: backup

      - name: Extract archive
        run: |
          tar -xzf backup/supabase-backup-*.tar.gz
          ls -la

      - name: Setup PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Start PostgreSQL service for validation
        run: |
          docker run -d \
            --name pg-validator \
            -e POSTGRES_PASSWORD=testpass \
            -e POSTGRES_DB=testdb \
            -p 5432:5432 \
            postgres:16

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Restore and validate schema
        run: |
          BACKUP_DIR=$(ls -d backup/supabase-*/)
          echo "Using backup directory: $BACKUP_DIR"
          
          # Restore schema (skip roles.sql - requires Supabase-specific roles)
          PGPASSWORD=testpass psql -h localhost -U postgres -d testdb -f "$BACKUP_DIR/schema.sql" || true
          
          # Validate: check tables exist
          TABLE_COUNT=$(PGPASSWORD=testpass psql -h localhost -U postgres -d testdb -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE';")
          echo "Tables restored: $TABLE_COUNT"
          
          if [ "$TABLE_COUNT" -gt 0 ]; then
            echo "✓ Schema validation passed"
          else
            echo "✗ Schema validation failed - no tables found"
            exit 1
          fi

      - name: Restore and validate data
        run: |
          BACKUP_DIR=$(ls -d backup/supabase-*/)
          
          # Restore data
          PGPASSWORD=testpass psql -h localhost -U postgres -d testdb -f "$BACKUP_DIR/data.sql" || true
          
          # Validate: check data exists (at least one table has rows)
          ROW_COUNT=$(PGPASSWORD=testpass psql -h localhost -U postgres -d testdb -t -c "SELECT SUM(n_live_tup)::bigint FROM pg_stat_user_tables WHERE schemaname = 'public';")
          echo "Total rows across tables: $ROW_COUNT"
          
          # Validate: check FK constraints exist
          FK_COUNT=$(PGPASSWORD=testpass psql -h localhost -U postgres -d testdb -t -c "SELECT COUNT(*) FROM information_schema.table_constraints WHERE constraint_type = 'FOREIGN KEY' AND table_schema = 'public';")
          echo "Foreign key constraints: $FK_COUNT"
          
          if [ "$FK_COUNT" -gt 0 ]; then
            echo "✓ Data validation passed - FK constraints restored"
          else
            echo "⚠ No FK constraints found (may be normal for this schema)"
          fi

      - name: Cleanup
        if: always()
        run: docker stop pg-validator || true
